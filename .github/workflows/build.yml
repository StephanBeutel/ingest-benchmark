name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS (arm64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-15

    env:
      OBS_VERSION: "32.1.0"

    steps:
      - uses: actions/checkout@v4

      # OBS source headers (shallow clone — we only need the header files)
      - name: Clone OBS source headers
        run: |
          git clone --depth 1 --branch "$OBS_VERSION" \
            https://github.com/obsproject/obs-studio.git /tmp/obs-headers

      # OBS.app binary — provides libobs.framework, obs-frontend-api dylib, Qt frameworks
      - name: Download and mount OBS.app
        run: |
          curl -L --retry 3 -o /tmp/obs.dmg \
            "https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/OBS-Studio-${OBS_VERSION}-macOS-Apple.dmg"
          hdiutil attach /tmp/obs.dmg -mountpoint /Volumes/OBS -nobrowse -quiet
          cp -R "/Volumes/OBS/OBS.app" /Applications/OBS.app
          hdiutil detach /Volumes/OBS -quiet

      # Homebrew Qt — headers + MOC/UIC tools only; we link against OBS's bundled Qt
      - name: Install build tools
        run: |
          brew install qt@6 simde cmake
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DOBS_APP=/Applications/OBS.app \
            -DOBS_SOURCE_DIR=/tmp/obs-headers \
            -DQt6_DIR="$(brew --prefix qt@6)/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Package
        run: |
          mkdir -p dist
          cp -R build/obs-twitch-ingest-benchmark.plugin dist/
          cd dist
          zip -r ../obs-twitch-ingest-benchmark-macos-arm64.zip \
            obs-twitch-ingest-benchmark.plugin

      - uses: actions/upload-artifact@v4
        with:
          name: obs-twitch-ingest-benchmark-macos
          path: obs-twitch-ingest-benchmark-macos-arm64.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows (x64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2022

    env:
      OBS_VERSION: "32.1.0"
      QT_VERSION: "6.8.1"

    steps:
      - uses: actions/checkout@v4

      # Qt for building our plugin (not needed for the OBS mini-build)
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          cache: true

      # libcurl for our plugin (via vcpkg)
      - name: Install libcurl
        shell: cmd
        run: vcpkg install curl:x64-windows-static

      # Clone OBS source — we build only libobs + obs-frontend-api.
      # The OBS Windows release zip ships only .dll files (no import .lib);
      # there is no pre-built SDK package. OBS auto-downloads its own deps
      # (obs-deps) at CMake configure time via file(DOWNLOAD).
      - name: Clone OBS source
        shell: pwsh
        run: |
          git clone --depth 1 --branch "$env:OBS_VERSION" `
            https://github.com/obsproject/obs-studio.git C:\obs-src

      # Configure OBS with everything disabled except libobs + obs-frontend-api.
      # OBS 32.x auto-fetches its deps (zlib, openssl, etc.) during configure.
      # ENABLE_FRONTEND=OFF suppresses Qt6 requirement entirely.
      - name: Configure OBS (libobs + obs-frontend-api only)
        shell: pwsh
        run: |
          cmake -B C:\obs-build -S C:\obs-src `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="C:\obs-install" `
            -DENABLE_FRONTEND=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_HEVC=OFF

      # Build only the two targets we need, then install headers + .lib files.
      # The CMake target for the core library is "libobs", not "obs".
      - name: Build OBS libs
        shell: pwsh
        run: |
          cmake --build C:\obs-build --config RelWithDebInfo `
            --target libobs obs-frontend-api --parallel

      - name: Install OBS SDK
        shell: pwsh
        run: |
          cmake --install C:\obs-build --config RelWithDebInfo `
            --component Development

      # Configure our plugin against the freshly installed OBS SDK.
      # libobsConfig.cmake requires SIMDe from obs-deps, which OBS downloaded
      # into C:\obs-src\.deps\ during configure. Find that directory and add it
      # to CMAKE_PREFIX_PATH so FindSIMDe.cmake can locate the headers.
      - name: Configure plugin
        shell: pwsh
        run: |
          $obsDeps = Get-ChildItem "C:\obs-src\.deps" -Directory |
                       Where-Object { $_.Name -like "obs-deps-*" } |
                       Select-Object -First 1 -ExpandProperty FullName
          Write-Host "obs-deps path: $obsDeps"
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="C:\obs-install;$obsDeps" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DQt6_DIR="$env:Qt6_DIR"

      - name: Build plugin
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Package
        shell: pwsh
        run: |
          $dll = Get-ChildItem build -Recurse -Filter "obs-twitch-ingest-benchmark.dll" |
                   Select-Object -First 1
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $dll.FullName dist\obs-twitch-ingest-benchmark.dll
          Compress-Archive -Path dist\obs-twitch-ingest-benchmark.dll `
                           -DestinationPath obs-twitch-ingest-benchmark-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: obs-twitch-ingest-benchmark-windows
          path: obs-twitch-ingest-benchmark-windows.zip

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — attach both zips when a tag is pushed
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: obs-twitch-ingest-benchmark-macos

      - uses: actions/download-artifact@v4
        with:
          name: obs-twitch-ingest-benchmark-windows

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            obs-twitch-ingest-benchmark-macos-arm64.zip
            obs-twitch-ingest-benchmark-windows.zip
          generate_release_notes: true
