<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" ry="18" fill="#1a1a2e"/>

  <!-- Bar chart: 4 bars representing servers, left to right, varying heights -->
  <!-- Bar 1 (low score) -->
  <rect x="10" y="62" width="14" height="22" rx="3" ry="3" fill="#4a4a6a"/>
  <!-- Bar 2 (medium-low) -->
  <rect x="28" y="50" width="14" height="34" rx="3" ry="3" fill="#4a4a6a"/>
  <!-- Bar 3 (medium) -->
  <rect x="46" y="40" width="14" height="44" rx="3" ry="3" fill="#4a4a6a"/>
  <!-- Bar 4 (best server — highlighted) -->
  <rect x="64" y="22" width="14" height="62" rx="3" ry="3" fill="#9146ff"/>

  <!-- Checkmark badge over best bar -->
  <circle cx="71" cy="20" r="11" fill="#1a1a2e"/>
  <circle cx="71" cy="20" r="9" fill="#00c853"/>
  <!-- Checkmark -->
  <polyline points="65,20 69,25 78,14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
